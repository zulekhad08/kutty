<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>NAVBAR</title>
    <style>
        .nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            gap: 10px;
            background-color: rgb(249, 184, 195);
        }
        .logo{
            color: black;
            font-size: 20px;
            font-weight: bold;
            background-color: aquamarine;
        }
        .nav-links{
             display: flex;
             list-style: none;
            gap: 20px;
            background-color: rgb(196, 135, 113);
        }
        .nav-links ul{
            color:red;
            list-style-type: none;
            display: flex;
            gap: 30px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">MySite</div>
        <div class="nav-links">
            <ul>
                <li><a href="/home.html">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/moreinfo.html">Moreinfo</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
