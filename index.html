<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>NAVBAR</title>
    <style>
        .nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            gap: 10px;
            background-color: rgb(249, 184, 195);
        }
        .logo{
            color: black;
            font-size: 20px;
            font-weight: bold;
            background-color: aquamarine;
        }
        .nav-links{
             display: flex;
             list-style: none;
            gap: 20px;
            background-color: rgb(196, 135, 113);
        }
        .nav-links ul{
            color:red;
            list-style-type: none;
            display: flex;
            gap: 30px;
        }
        .flex-kutty{
    display:flex;
    padding:20px;
    flex-wrap:wrap;
    flex-direction: row;
    align-items: center;
}

.flex-item{
    background-color: rgb(156, 69, 133);
    padding: 15px;
    width:220px;
    text-align: center;
    border-radius:10px;
    margin: 10px;
    color: black;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.flex-item:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.flex-item img{
    width:100%;
    height:150px;
    border-radius:10px;
    object-fit:cover;
}

.price{
    color:beige;
    font-weight:bold;
}

button{
    background-color:rgb(217, 172, 90);
    border-radius: 20px;
    cursor: pointer;
    padding:8px 12px;
    border:none;
    margin-top:8px;
}

button:hover{
    background-color:orange;
    color:white;
}
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">MySite</div>
        <div class="nav-links">
            <ul>
                <li><a href="/home.html">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/moreinfo.html">Moreinfo</a></li>
                <div class="flex-kutty">
                <div class="flex-item">
    <img src="https://th.bing.com/th/id/OIP.A9K0yPJJnwxcu6HSww2rwQHaHa?w=266&h=200&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
    <p class="price">₹10,00,199/-</p>
    <button>Add to Cart</button>
</div>
                <div class="flex-item">
    <img src="https://th.bing.com/th/id/OIP.jKWh3dTeq8okFzpcekpCxQHaHa?w=197&h=196&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
    <p class="price">₹17,00,999/-</p>
    <button>Add to Cart</button>
</div>
                <div class="flex-item">
    <img src="https://th.bing.com/th/id/OIP.SQOklwt1ks-g00bel2x-vAHaHa?w=265&h=199&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
    <h1>SAPPHIRE RING</h1>
    <p class="price">₹13,13,699/-</p>
    <button>Add to Cart</button>
</div>  
                </div>
            </ul>
        </div>
    </div>
</body>
</html>
